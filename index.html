<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nokia Snake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone">
    <div class="phone-top">
      <div class="earpiece"></div>
      <div class="logo">NOKIA</div>
    </div>

    <div class="screen-bezel">
      <div id="score">Score: 0</div>
      <canvas id="screen"></canvas>
      <div id="status"></div>
    </div>

    <div class="controls">
      <div class="soft-keys">
        <span>Menu</span>
        <span>Exit</span>
      </div>

      <div class="dpad">
        <button type="button" class="dpad-up" data-dir="up" aria-label="Up"></button>
        <button type="button" class="dpad-left" data-dir="left" aria-label="Left"></button>
        <button type="button" class="dpad-center" data-action="activate" aria-label="Start / OK"></button>
        <button type="button" class="dpad-right" data-dir="right" aria-label="Right"></button>
        <button type="button" class="dpad-down" data-dir="down" aria-label="Down"></button>
      </div>

      <div class="keypad">
        <button type="button" class="key">1</button>
        <button type="button" class="key" data-dir="up">2</button>
        <button type="button" class="key">3</button>
        <button type="button" class="key" data-dir="left">4</button>
        <button type="button" class="key">5</button>
        <button type="button" class="key" data-dir="right">6</button>
        <button type="button" class="key">7</button>
        <button type="button" class="key" data-dir="down">8</button>
        <button type="button" class="key">9</button>
        <button type="button" class="key">*</button>
        <button type="button" class="key">0</button>
        <button type="button" class="key">#</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
